# =============================================================================
apache-airflow:
  Pulled: dp.apps.rancher.io/charts/apache-airflow:1.20.0
  Digest: sha256:9ac3ff5f52c82f580a6b213f04b29b52cca14a32175618735bd9b5ea06044fab
  # Licensed to the Apache Software Foundation (ASF) under one
