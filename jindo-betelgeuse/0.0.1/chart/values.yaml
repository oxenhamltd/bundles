        enabled: ~
        resources: {}
        #  limits:
        #   cpu: 100m
        #   memory: 128Mi
        #  requests:
        #   cpu: 100m
        #   memory: 128Mi

        # Detailed default security context for kerberos init container
        securityContexts:
          container: {}
        # Container level lifecycle hooks
        containerLifecycleHooks: {}
      # Resource configuration for Airflow Celery workers
      resources: {}
      #  limits:
      #   cpu: 100m
      #   memory: 128Mi
      #  requests:
      #   cpu: 100m
