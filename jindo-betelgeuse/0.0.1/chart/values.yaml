  # runAsUser: 1000

  # -- Specify runtime class
  runtimeClassName: ""
  # Configure Service
  service:
    # -- Service type
    type: ClusterIP
    # -- Service port
    port: 11434
    # -- Service node port when service type is 'NodePort'
    nodePort: 31434
    # -- Load Balancer IP address
    loadBalancerIP:
