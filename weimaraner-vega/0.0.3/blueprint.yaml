    - moduleRef: "pytorch"
      displayName: "PyTorch"
      description: "PyTorch is a machine learning library based on the Torch library, used for applications such as computer vision and natural language processing"
      category: "modelTraining"
      support: "SUSE"
      source:
        helm:
          url: "oci://dp.apps.rancher.io/charts/pytorch"
          ref: ">0.0.0-0"
          path: ""
      targetNamespace: "weimaraner-vega"
    - moduleRef: "vlm"
      displayName: "vlm"
      description: ""
      category: "custom-container"
      support: "Open Source"
      source:
        helm:
          url: "custom"
          ref: ">0.0.0-0"
          path: ""
      targetNamespace: "weimaraner-vega"