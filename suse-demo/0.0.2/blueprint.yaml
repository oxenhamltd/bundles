apiVersion: suse.ai/v1alpha1
kind: Blueprint
metadata:
  name: "suse-demo"
  labels:
    catalog.suse.ai/support: "opensource"
    catalog.suse.ai/tier: "certified"
    catalog.suse.ai/certified: "false"
    catalog.suse.ai/status: "new"
  mantainer: "alessandro.festa1@suse.com"
  source: "https://github.com/oxenhamltd/bundles"
spec:
  displayName: "suse-demo"
  description: "A simple description"
  category: "Inference"
  source:
    git:
      url: "https://github.com/oxenhamltd/bundles"
      ref: "main"
      path: "suse-demo/0.0.2/chart"
  modules:
    - moduleRef: "milvus"
      displayName: "Milvus"
      description: "Milvus is a high-performance vector database built for scale. It is used by AI applications to organize and search through large amount of unstructured data, such as text, images, and multi-modal information."
      category: "dataIngestion"
      support: "SUSE"
      source:
        helm:
          url: "oci://dp.apps.rancher.io/charts/milvus"
          ref: ">0.0.0-0"
          path: ""
      targetNamespace: "suse-demo"
    - moduleRef: "google-gemma-2-2b-it"
      displayName: ""
      description: "Inference model: google/gemma-2-2b-it"
      category: "inference"
      support: "NVIDIA"
      source:
        helm:
          url: "https://helm.ngc.nvidia.com/nim/charts/nim-llm-1.15.5.tgz"
          ref: ">0.0.0-0"
          path: ""
      targetNamespace: "suse-demo"
    - moduleRef: "open-webui"
      displayName: "Open WebUI"
      description: "Open WebUI is an extensible, feature-rich, and user-friendly self-hosted WebUI designed to operate entirely offline. It supports various LLM runners, including Ollama and OpenAI-compatible APIs."
      category: "applicationUI"
      support: "SUSE"
      source:
        helm:
          url: "oci://dp.apps.rancher.io/charts/open-webui"
          ref: ">0.0.0-0"
          path: ""
      targetNamespace: "suse-demo"