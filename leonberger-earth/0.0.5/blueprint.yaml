apiVersion: suse.ai/v1alpha1
kind: Blueprint
metadata:
  name: "leonberger-earth"
  labels:
    catalog.suse.ai/support: "opensource"
    catalog.suse.ai/tier: "certified"
    catalog.suse.ai/certified: "false"
    catalog.suse.ai/status: "new"
  mantainer: "alessandro.festa1@suse.com"
  source: "https://github.com/oxenhamltd/bundles"
spec:
  displayName: "leonberger-earth"
  description: "ss"
  category: "Inference"
  source:
    git:
      url: "https://github.com/oxenhamltd/bundles"
      ref: "main"
      path: "leonberger-earth/0.0.5/chart"
  modules:
    - moduleRef: "apache-kafka"
      displayName: "Apache Kafka"
      description: "Apache Kafka is an open-source distributed event streaming platform used for high-performance data pipelines, streaming analytics, data integration, and mission-critical applications."
      category: "dataIngestion"
      support: "SUSE"
      source:
        helm:
          url: "oci://dp.apps.rancher.io/charts/apache-kafka"
          ref: ">0.0.0-0"
          path: ""
      targetNamespace: "leonberger-earth"
    - moduleRef: "ollama"
      displayName: "Ollama"
      description: "Get up and running with Llama 3.2, Mistral, Gemma 2, and other large language models."
      category: "inference"
      support: "SUSE"
      source:
        helm:
          url: "oci://dp.apps.rancher.io/charts/ollama"
          ref: ">0.0.0-0"
          path: ""
      targetNamespace: "leonberger-earth"
    - moduleRef: "pytorch"
      displayName: "PyTorch"
      description: "PyTorch is a machine learning library based on the Torch library, used for applications such as computer vision and natural language processing"
      category: "modelTraining"
      support: "SUSE"
      source:
        helm:
          url: "oci://dp.apps.rancher.io/charts/pytorch"
          ref: ">0.0.0-0"
          path: ""
      targetNamespace: "leonberger-earth"