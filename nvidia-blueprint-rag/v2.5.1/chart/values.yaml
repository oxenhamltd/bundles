# =============================================================================
milvus:
  Pulled: dp.apps.rancher.io/charts/milvus:5.0.19
  Digest: sha256:464f0a3819e5ad4476435b22cbd798c78b42934ac5e732eb503807996ae26200
  global:
    # -- Global override for container image registry
    imageRegistry: ""
    # -- Global override for container image registry pull secrets
    imagePullSecrets: []
  ## Expand the name of the chart
  nameOverride: ""
  ## Default fully qualified app name
  fullnameOverride: ""
  ## Enable or disable Milvus Cluster mode
  cluster:
    enabled: true
  ## Resource group isolation for multi-replica mode (cluster mode only).
  ## List of resource group names (e.g., ["rg1", "rg2"]).
  ## When set, creates per-RG querynode and streamingnode deployments,
  ## and auto-configures cluster-level multi-replica settings.
  replicaResourceGroups: []
  image:
    all:
      repository: containers/milvus
      tag: 2.6.15-5.1
      pullPolicy: IfNotPresent
      ## Optionally specify an array of imagePullSecrets.
      ## Secrets must be manually created in the namespace.
      ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
      ##
      # pullSecrets:
      #   - myRegistryKeySecretName

      registry: dp.apps.rancher.io
  # Global node selector
  # If set, this will apply to all milvus components
  # Individual components can be set to a different node selector
  nodeSelector: {}
  # Global tolerations
  # If set, this will apply to all milvus components
  # Individual components can be set to a different tolerations
  tolerations: []
  # Global affinity
  # If set, this will apply to all milvus components
  # Individual components can be set to a different affinity
  affinity: {}
  # Global securityContext
  # If set, this will apply to all milvus components
  # Individual components can be set to a different securityContext
  containerSecurityContext: {}
  securityContext: {}
  # runAsUser: 1000
  # runAsGroup: 1000
  # fsGroup: 1000
  # runAsNonRoot: true

  # Global topologySpreadConstraints
  # If set, this will apply to all milvus components
  # Individual components can be set to different topologySpreadConstraints
  # ref: https://kubernetes.io/docs/concepts/scheduling-eviction/topology-spread-constraints/
  topologySpreadConstraints: []
  # - maxSkew: 1
  #   topologyKey: topology.kubernetes.io/zone
  #   whenUnsatisfiable: DoNotSchedule
  #   labelSelector:
  #     matchLabels:
  #       app.kubernetes.io/name: milvus

  # Global labels and annotations
  # If set, this will apply to all milvus components
  labels: {}
  annotations: {}
  # Global Volumes & volumeMounts
  # If set, this will apply to all milvus components
  # ref: https://kubernetes.io/docs/concepts/storage/volumes/
  volumes: []
  volumeMounts: []
  # Streaming node
  # Default config for 2.6.0 or later.
  streaming:
    enabled: true
    woodpecker:
      embedded: true
      storage:
        type: minio
  ##
  ## If set, the whole config will be mounted from this custom ConfigMap.
  ## The ConfigMap should have a key named `milvus.yaml` which contains the full Milvus config.
  ## extraConfigFiles will be ignored if this variable is set.
  ##
  customConfigMap: ""
  # Extra configs for milvus.yaml
  # If set, this config will merge into milvus.yaml
  # Please follow the config structure in the milvus.yaml
  # at https://github.com/milvus-io/milvus/blob/master/configs/milvus.yaml
  # Note: this config will be the top priority which will override the config
  # in the image and helm chart.
  extraConfigFiles:
    user.yaml: |+
      #    For example enable rest http for milvus proxy
      #    proxy:
      #      http:
      #        enabled: true
      #      maxUserNum: 100
      #      maxRoleNum: 10
      ##  Enable tlsMode and set the tls cert and key
      #  tls:
      #    serverPemPath: /etc/milvus/certs/tls.crt
      #    serverKeyPath: /etc/milvus/certs/tls.key
      #   common:
      #     security:
      #       tlsMode: 1

  ## Expose the Milvus service to be accessed from outside the cluster (LoadBalancer service).
  ## or access it from within the cluster (ClusterIP service). Set the service type and the port to serve it.
  ## ref: http://kubernetes.io/docs/user-guide/services/
  ##
  service:
    type: ClusterIP
    port: 19530
    portName: milvus
    nodePort: ""
    annotations: {}
    labels: {}
    ## List of IP addresses at which the Milvus service is available
    ## Ref: https://kubernetes.io/docs/user-guide/services/#external-ips
    ##
    externalIPs: []
    #   - externalIp1

    # LoadBalancerSourcesRange is a list of allowed CIDR values, which are combined with ServicePort to
    # set allowed inbound rules on the security group assigned to the master load balancer
    loadBalancerSourceRanges:
      - 0.0.0.0/0
      # Optionally assign a known public LB IP
      # loadBalancerIP: 1.2.3.4
  ingress:
    enabled: false
    ingressClassName: ""
    annotations:
      # Annotation example: set nginx ingress type
      # kubernetes.io/ingress.class: nginx
      nginx.ingress.kubernetes.io/backend-protocol: GRPC
      nginx.ingress.kubernetes.io/listen-ports-ssl: '[19530]'
      nginx.ingress.kubernetes.io/proxy-body-size: 4m
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
    labels: {}
    rules:
      - host: "milvus-example.local"
        path: "/"
        pathType: "Prefix"
        # - host: "milvus-example2.local"
        #   path: "/otherpath"
        #   pathType: "Prefix"
    tls: []
