apiVersion: v2
name: "nvidia-blueprint-rag"
description: "An end to end Helm chart for the NVIDIA RAG Blueprint"
version: "v2.5.0"
appVersion: "1.0"
type: application
annotations:
  blueprint.suse.ai/name: "nvidia-blueprint-rag"
  blueprint.suse.ai/version: "v2.5.0"
  blueprint.suse.ai/last-edit: "2026-05-12T17:23:25Z"
  blueprint.suse.ai/authors: "alessandro.festa1@suse.com"
dependencies:
  - name: "apache-airflow"
    version: ">0.0.0-0"
    repository: "oci://dp.apps.rancher.io/charts"
    condition: apache-airflow.enabled
  - name: "opentelemetry-collector"
    version: ">0.0.0-0"
    repository: "oci://dp.apps.rancher.io/charts"
    condition: opentelemetry-collector.enabled
  - name: "nv-ingest"
    version: "26.1.2"
    repository: "https://helm.ngc.nvidia.com/nvidia/nemo-microservices"
    condition: nv-ingest.enabled
