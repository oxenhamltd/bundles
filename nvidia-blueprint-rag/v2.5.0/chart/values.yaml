      #  extraVolumeMounts:
      #    - name: my-templated-extra-volume
      #      mountPath: "{{ .Values.my_custom_path }}"
      #      readOnly: true

      # Supported env vars for gitsync can be found at https://github.com/kubernetes/git-sync
      env: []
      # - name: ""
      #   value: ""

      # Configuration for empty dir volume
      # emptyDirConfig:
      #   sizeLimit: 1Gi
