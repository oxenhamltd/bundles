  #      tensorParallelism: "2"
      storage:
        pvc:
          create: true
          size: "120Gi"
          volumeAccessMode: ReadWriteOnce
          storageClass: ""
        sharedMemorySizeLimit: "16Gi"
  #    draResources:
  #      - claimCreationSpec:
  #          devices:
  #            - name: nimllm-gpu
  #              count: 1
  #              deviceClassName: gpu.nvidia.com
