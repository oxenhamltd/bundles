  #      - name: NIM_KVCACHE_PERCENT
  #        value: "0.9"
  #      - name: CUDA_VISIBLE_DEVICES
  #        value: "0"
      expose:
        service:
          name: http
          type: ClusterIP
          port: 8000
          grpcPort: 8001
      startupProbe:
        enabled: true
        probe:
          httpGet:
            path: /v1/health/ready
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 10
          failureThreshold: 750
          timeoutSeconds: 5

  # subsection: nvidia-nim-llama-32-nv-embedqa-1b-v2
