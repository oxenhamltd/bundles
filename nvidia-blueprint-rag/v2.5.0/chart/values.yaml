  # -- NV-Ingest dependency configuration
  # subsection: nv-ingest
  # NV-Ingest Service
  nv-ingest:
    enabled: true
    imagePullSecrets:
      - name: "ngc-secret"
    ngcApiSecret:
      create: false
    ngcImagePullSecret:
      create: false
    image:
      repository: "nvcr.io/nvidia/nemo-microservices/nv-ingest"
      tag: "26.1.2"
    resources:
      limits:
        nvidia.com/gpu: 0
    envVars:
      ARROW_DEFAULT_MEMORY_POOL: "system"
      OMP_NUM_THREADS: "1"
      INGEST_LOG_LEVEL: WARNING
      INGEST_RAY_LOG_LEVEL: "PRODUCTION"
      INGEST_DYNAMIC_MEMORY_THRESHOLD: "0.80"
      INGEST_DISABLE_DYNAMIC_SCALING: "True"
      NV_INGEST_MAX_UTIL: 48
      INGEST_EDGE_BUFFER_SIZE: 64
      MRC_IGNORE_NUMA_CHECK: 1
      READY_CHECK_ALL_COMPONENTS: "False"
      REDIS_MORPHEUS_TASK_QUEUE: morpheus_task_queue
      REDIS_INGEST_TASK_QUEUE: "ingest_task_queue"
      NV_INGEST_DEFAULT_TIMEOUT_MS: "1234"
      MAX_INGEST_PROCESS_WORKERS: 16
      VLM_CAPTION_PROMPT: "Caption the content of this image"

      # Ray internals configuration
      RAY_num_grpc_threads: "1"
      RAY_num_server_call_thread: "1"
      RAY_worker_num_grpc_internal_threads: "1"

      EMBEDDING_NIM_ENDPOINT: "http://nemotron-embedding-ms:8000/v1"
      EMBEDDING_NIM_MODEL_NAME: "nvidia/llama-nemotron-embed-1b-v2"
      MESSAGE_CLIENT_HOST: "rag-redis-master"
      MESSAGE_CLIENT_PORT: 6379
      MESSAGE_CLIENT_TYPE: "redis"
      MINIO_INTERNAL_ADDRESS: "rag-minio:9000"
      MINIO_PUBLIC_ADDRESS: "http://localhost:9000"
      MINIO_BUCKET: "nv-ingest"
      MINIO_ACCESS_KEY: "minioadmin"
      MINIO_SECRET_KEY: "minioadmin"
      MILVUS_ENDPOINT: "http://milvus:19530"
      OTEL_EXPORTER_OTLP_ENDPOINT: "otel-collector:4317"
      MODEL_PREDOWNLOAD_PATH: "/workspace/models/"
      INSTALL_AUDIO_EXTRACTION_DEPS: "true"
      COMPONENTS_TO_READY_CHECK: "ALL"

      # OCR routing (defaults to NeMo Retriever OCR service)
      OCR_GRPC_ENDPOINT: nemoretriever-ocr-v1:8001
      OCR_HTTP_ENDPOINT: http://nemoretriever-ocr-v1:8000/v1/infer
      OCR_INFER_PROTOCOL: grpc
      OCR_MODEL_NAME: scene_text_ensemble

      # NeMo Retriever Parse (VLM text extraction)
      NEMOTRON_PARSE_HTTP_ENDPOINT: http://nemotron-parse:8000/v1/chat/completions
      NEMOTRON_PARSE_INFER_PROTOCOL: http
      NEMOTRON_PARSE_MODEL_NAME: nvidia/nemotron-parse

      # PDF splitting configuration
      PDF_SPLIT_PAGE_COUNT: "32"

      # YOLOX endpoints
      YOLOX_PAGE_IMAGE_FORMAT: "JPEG"
      YOLOX_GRPC_ENDPOINT: nemoretriever-page-elements-v3:8001
      YOLOX_HTTP_ENDPOINT: http://nemoretriever-page-elements-v3:8000/v1/infer
      YOLOX_INFER_PROTOCOL: grpc
      YOLOX_GRAPHIC_ELEMENTS_GRPC_ENDPOINT: nemoretriever-graphic-elements-v1:8001
      YOLOX_GRAPHIC_ELEMENTS_HTTP_ENDPOINT: http://nemoretriever-graphic-elements-v1:8000/v1/infer
      YOLOX_GRAPHIC_ELEMENTS_INFER_PROTOCOL: grpc
      YOLOX_TABLE_STRUCTURE_GRPC_ENDPOINT: nemoretriever-table-structure-v1:8001
      YOLOX_TABLE_STRUCTURE_HTTP_ENDPOINT: http://nemoretriever-table-structure-v1:8000/v1/infer
      YOLOX_TABLE_STRUCTURE_INFER_PROTOCOL: grpc

      # Captioning
      VLM_CAPTION_MODEL_NAME: nvidia/nemotron-nano-12b-v2-vl
      VLM_CAPTION_ENDPOINT: http://nim-vlm:8000/v1/chat/completions

      # Audio service
      AUDIO_GRPC_ENDPOINT: nv-ingest-riva-nim:50051
      AUDIO_INFER_PROTOCOL: grpc

    # Expose internal Milvus/MinIO config managed by nv-ingest subchart
    milvusDeployed: true
    milvus:
      # Uncomment this section to enable authentication for Milvus
      # extraConfigFiles:
      #   user.yaml: |+
      #     common:
      #       security:
      #         authorizationEnabled: true
      #         defaultRootPassword: Milvus
      image:
        all:
          repository: docker.io/milvusdb/milvus
          tag: v2.6.5-gpu
        tools:
          repository: docker.io/milvusdb/milvus-config-tool
          tag: v0.1.2
          pullPolicy: IfNotPresent
      etcd:
        image:
          repository: milvusdb/etcd
          tag: "3.5.23-r2"
      standalone:
        resources:
          limits:
            nvidia.com/gpu: 1
      minio:
        image:
          repository: docker.io/minio/minio
          tag: "RELEASE.2025-09-07T16-13-09Z"
        accessKey: minioadmin
        secretKey: minioadmin
        bucketName: nv-ingest
      fullnameOverride: milvus

    # Redis Master
    redis:
      image:
        repository: redis
        tag: 8.2.1


    # Ensure nv-ingest does not deploy its own observability components
    otelDeployed: false
    zipkinDeployed: false

    nimOperator:
      # Ensure nv-ingest does not deploy its own embedding NIM
      embedqa:
        enabled: false

      # NeMo Retriever OCR (default)
      # To use PaddleOCR instead, override the image:
      # nemoretriever_ocr_v1:
      #   enabled: true
      #   image:
      #     repository: nvcr.io/nim/baidu/paddleocr
      #     tag: 1.5.0
      # And set OCR_MODEL_NAME to "paddle" in envVars above
      nemoretriever_ocr_v1:
        enabled: true
        storage:
          pvc:
            volumeAccessMode: "ReadWriteOnce"
            storageClass: ""
        tolerations: []
        replicaCount: 1
        image:
          repository: nvcr.io/nim/nvidia/nemoretriever-ocr-v1
          tag: "1.2.1"
        imagePullSecrets:
          - name: ngc-secret
        env:
          - name: OMP_NUM_THREADS
            value: "8"
          - name: NIM_HTTP_API_PORT
            value: "8000"
          - name: NIM_TRITON_LOG_VERBOSE
            value: "1"
          - name: CUDA_VISIBLE_DEVICES
            value: "0"
          - name: NIM_TRITON_CUDA_MEMORY_POOL_MB
            value: "8192"
          - name: NIM_TRITON_MAX_BATCH_SIZE
            value: "32"
          - name: NIM_TRITON_ENABLE_MODEL_CONTROL
            value: "1"
        resources:
          limits:
            nvidia.com/gpu: 1
          requests:
            nvidia.com/gpu: 1

      # NIM Graphic Elements
      graphic_elements:
        enabled: true
        storage:
          pvc:
            volumeAccessMode: "ReadWriteOnce"
            storageClass: ""
        tolerations: []
        replicaCount: 1
        image:
          repository: nvcr.io/nim/nvidia/nemotron-graphic-elements-v1
          tag: "1.8.0"
        env:
          - name: NIM_HTTP_API_PORT
            value: "8000"
          - name: NIM_TRITON_LOG_VERBOSE
            value: "1"
          - name: NIM_TRITON_RATE_LIMIT
            value: "3"
          - name: CUDA_VISIBLE_DEVICES
            value: "0"
          - name: NIM_TRITON_MAX_BATCH_SIZE
            value: "32"
          - name: NIM_TRITON_CUDA_MEMORY_POOL_MB
            value: "2048"
          - name: OMP_NUM_THREADS
            value: "1"
        resources:
          limits:
            nvidia.com/gpu: 1
          requests:
            nvidia.com/gpu: 1

      # NIM Page Elements
      page_elements:
        enabled: true
        storage:
          pvc:
            volumeAccessMode: "ReadWriteOnce"
            storageClass: ""
        tolerations: []
        replicaCount: 1
        image:
          repository: nvcr.io/nim/nvidia/nemotron-page-elements-v3
          tag: "1.8.0"
        env:
          - name: NIM_HTTP_API_PORT
            value: "8000"
          - name: NIM_TRITON_LOG_VERBOSE
            value: "1"
          - name: NIM_TRITON_RATE_LIMIT
            value: "3"
          - name: CUDA_VISIBLE_DEVICES
            value: "0"
          - name: NIM_TRITON_MAX_BATCH_SIZE
            value: "32"
          - name: NIM_TRITON_CUDA_MEMORY_POOL_MB
            value: "2048"
          - name: NIM_TRITON_CPU_THREADS_PRE_PROCESSOR
            value: "2"
          - name: NIM_TRITON_CPU_THREADS_POST_PROCESSOR
            value: "1"
          - name: OMP_NUM_THREADS
            value: "2"
          - name: NIM_ENABLE_OTEL
            value: "true"
          - name: NIM_OTEL_SERVICE_NAME
            value: "page-elements"
          - name: NIM_OTEL_TRACES_EXPORTER
            value: "otlp"
          - name: NIM_OTEL_METRICS_EXPORTER
            value: "console"
          - name: NIM_OTEL_EXPORTER_OTLP_ENDPOINT
            value: "http://otel-collector:4318"
          - name: TRITON_OTEL_URL
            value: "http://otel-collector:4318/v1/traces"
          - name: TRITON_OTEL_RATE
            value: "1"
        resources:
          limits:
            nvidia.com/gpu: 1
          requests:
            nvidia.com/gpu: 1

      # NIM Table Structure
      table_structure:
        enabled: true
        storage:
          pvc:
            storageClass: ""
            volumeAccessMode: "ReadWriteOnce"
        tolerations: []
        replicaCount: 1
        image:
          repository: nvcr.io/nim/nvidia/nemotron-table-structure-v1
          tag: "1.8.0"
        env:
          - name: NIM_HTTP_API_PORT
            value: "8000"
          - name: NIM_TRITON_LOG_VERBOSE
            value: "1"
          - name: NIM_TRITON_RATE_LIMIT
            value: "3"
          - name: CUDA_VISIBLE_DEVICES
            value: "0"
          - name: NIM_TRITON_MAX_BATCH_SIZE
            value: "32"
          - name: NIM_TRITON_CUDA_MEMORY_POOL_MB
            value: "2048"
          - name: OMP_NUM_THREADS
            value: "1"
        resources:
          limits:
            nvidia.com/gpu: 1
          requests:
            nvidia.com/gpu: 1

      # Nemotron Parse (VLM text extraction)
      nemotron_parse:
        enabled: false
        storage:
          pvc:
            storageClass: ""
            volumeAccessMode: "ReadWriteOnce"
        nodeSelector: {}
        tolerations: []
        replicaCount: 1
        image:
          repository: nvcr.io/nim/nvidia/nemotron-parse
          tag: "1.5.0"
        env:
          - name: NIM_HTTP_API_PORT
            value: "8000"
          - name: NIM_TRITON_LOG_VERBOSE
            value: "1"
        resources:
          limits:
            nvidia.com/gpu: 1
          requests:
            nvidia.com/gpu: 1

      # Riva NIM for Audio Transcription
      audio:
        enabled: false
        authSecret: ngc-api
        storage:
          pvc:
            create: true
            storageClass: ""
            size: "25Gi"
            volumeAccessMode: "ReadWriteOnce"
        nodeSelector: {}
        tolerations: []
        replicas: 1
        image:
          repository: nvcr.io/nim/nvidia/parakeet-1-1b-ctc-en-us
          tag: "1.4.0"
          pullSecrets:
            - ngc-secret
        env:
          - name: NIM_TAGS_SELECTOR
            value: "name=parakeet-1-1b-ctc-en-us,mode=ofl"
          - name: NIM_TRITON_LOG_VERBOSE
            value: "1"
        expose:
          service:
            type: ClusterIP
            name: http
            port: 9000
            grpcPort: 50051
        resources:
          limits:
            nvidia.com/gpu: 1
          requests:
            nvidia.com/gpu: 1


