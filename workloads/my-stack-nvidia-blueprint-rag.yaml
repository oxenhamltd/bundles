{
  "apiVersion": "fleet.cattle.io/v1alpha1",
  "kind": "HelmOp",
  "metadata": {
    "name": "my-stack-nvidia-blueprint-rag",
    "namespace": "fleet-local"
  },
  "spec": {
    "defaultNamespace": "my-stack-system",
    "helm": {
      "chart": "nvidia-blueprint-rag",
      "disablePreProcess": true,
      "releaseName": "my-stack-nvidia-blueprint-rag",
      "repo": "https://helm.ngc.nvidia.com/nvidia/blueprint",
      "values": {
        "global": {
          "imagePullSecrets": [
            {
              "name": "suse-ai-pull-combined"
            }
          ]
        },
        "imagePullSecrets": [
          {
            "name": "suse-ai-pull-combined"
          }
        ]
      },
      "version": "v2.6.0"
    },
    "targets": [
      {
        "clusterName": "local"
      }
    ]
  }
}