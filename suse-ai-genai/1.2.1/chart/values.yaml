# Aggregated values.yaml

# Aggregated Stack Configuration
# Global configurations for image pull secrets
global:
  imagePullSecrets:
    - name: application-collection
    - name: nvidia-ngc-secret

imagePullSecrets:
  - name: application-collection
  - name: nvidia-ngc-secret



# =============================================================================
# --- suse-ai-genai ---
# =============================================================================
suse-ai-genai:
  # This is an example overrides yaml:
  # - enabling deployment of ollama with GPU.
  # - enabling deployment of mcpo.
  # - enabling deployment of open-webui.
  # - enabling deployment of milvus in cluster mode.
  # - services deployed with suse-gen-ai release name in suse-private-ai namespace.
  # - longhorn storage.
  # Please update these overrides as needed for your environment.

  global:
    imagePullSecrets:
    - application-collection
  ollama:
    #To learn more about the entries, helm show values oci://dp.apps.rancher.io/charts/ollama
    enabled: true
    ollama:
      models:
        pull:
        - "gemma:2b"
        run:
        - "gemma:2b"
      gpu:
       enabled: true
       type: 'nvidia'
       number: 1
    runtimeClassName: "nvidia"
    persistentVolume:
      enabled: true
      storageClass: longhorn
      size: 30Gi
  open-webui-mcpo:
    #To learn more about the entries, helm show values oci://dp.apps.rancher.io/charts/open-webui-mcpo
    enabled: true
    config:
      mcpServers:
        memory:
          command: npx
          args:
            - -y
            - "@modelcontextprotocol/server-memory"
  open-webui:
    #To learn more about the entries, helm show values oci://dp.apps.rancher.io/charts/open-webui
    enabled: true
    ollamaUrls:
    - http://suse-gen-ai-ollama.suse-private-ai.svc.cluster.local:11434
    persistence:
      enabled: true
      size: 20Gi
      storageClass: longhorn
    ollama:
      enabled: false
    pipelines:
      enabled: false
      extraEnvVars: []
    ingress:
      host: suse-ollama-webui
    extraEnvVars:
    - name: DEFAULT_MODELS
      value: "gemma:2b"
    - name: DEFAULT_USER_ROLE
      value: "user"
    - name: ENABLE_SIGNUP
      value: "true"
    - name: GLOBAL_LOG_LEVEL
      value: INFO
    - name: RAG_EMBEDDING_MODEL
      value: "sentence-transformers/all-MiniLM-L6-v2"
    - name: VECTOR_DB
      value: "milvus"
    - name: MILVUS_URI
      value: http://suse-gen-ai-milvus.suse-private-ai.svc.cluster.local:19530
    - name: INSTALL_NLTK_DATASETS
      value: "true"
  milvus:
    #To learn more about the entries, helm show values oci://dp.apps.rancher.io/charts/milvus
    enabled: true
    cluster:
      enabled: true
    etcd:
      replicaCount: 1
      persistence:
        storageClassName: longhorn
    minio:
      persistence:
        storageClass: longhorn
        size: 20Gi
      resources:
        requests:
          memory: 1024Mi
    kafka:
      enabled: true
      persistence:
        enabled: true
        storageClassName: longhorn
  pytorch:
    enabled: false
  vllm:
    enabled: false


# =============================================================================
# --- Milvus ---
# =============================================================================
milvus:
  Pulled: dp.apps.rancher.io/charts/milvus:5.0.19
  Digest: sha256:032afc200aedffe10e054c64997f092dd9770d33ff56f1b629e5116a7e54f3f0
  global:
    # -- Global override for container image registry
    imageRegistry: ""
    # -- Global override for container image registry pull secrets
    imagePullSecrets: []
  ## Expand the name of the chart
  nameOverride: ""
  ## Default fully qualified app name
  fullnameOverride: ""
  ## Enable or disable Milvus Cluster mode
  cluster:
    enabled: true
  ## Resource group isolation for multi-replica mode (cluster mode only).
  ## List of resource group names (e.g., ["rg1", "rg2"]).
  ## When set, creates per-RG querynode and streamingnode deployments,
  ## and auto-configures cluster-level multi-replica settings.
  replicaResourceGroups: []
  image:
    all:
      repository: containers/milvus
      tag: 2.6.15-5.1
      pullPolicy: IfNotPresent
      ## Optionally specify an array of imagePullSecrets.
      ## Secrets must be manually created in the namespace.
      ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
      ##
      # pullSecrets:
      #   - myRegistryKeySecretName

      registry: dp.apps.rancher.io
  # Global node selector
  # If set, this will apply to all milvus components
  # Individual components can be set to a different node selector
  nodeSelector: {}
  # Global tolerations
  # If set, this will apply to all milvus components
  # Individual components can be set to a different tolerations
  tolerations: []
  # Global affinity
  # If set, this will apply to all milvus components
  # Individual components can be set to a different affinity
  affinity: {}
  # Global securityContext
  # If set, this will apply to all milvus components
  # Individual components can be set to a different securityContext
  containerSecurityContext: {}
  securityContext: {}
  # runAsUser: 1000
  # runAsGroup: 1000
  # fsGroup: 1000
  # runAsNonRoot: true

  # Global topologySpreadConstraints
  # If set, this will apply to all milvus components
  # Individual components can be set to different topologySpreadConstraints
  # ref: https://kubernetes.io/docs/concepts/scheduling-eviction/topology-spread-constraints/
  topologySpreadConstraints: []
  # - maxSkew: 1
  #   topologyKey: topology.kubernetes.io/zone
  #   whenUnsatisfiable: DoNotSchedule
  #   labelSelector:
  #     matchLabels:
  #       app.kubernetes.io/name: milvus

  # Global labels and annotations
  # If set, this will apply to all milvus components
  labels: {}
  annotations: {}
  # Global Volumes & volumeMounts
  # If set, this will apply to all milvus components
  # ref: https://kubernetes.io/docs/concepts/storage/volumes/
  volumes: []
  volumeMounts: []
  # Streaming node
  # Default config for 2.6.0 or later.
  streaming:
    enabled: true
    woodpecker:
      embedded: true
      storage:
        type: minio
  ##
  ## If set, the whole config will be mounted from this custom ConfigMap.
  ## The ConfigMap should have a key named `milvus.yaml` which contains the full Milvus config.
  ## extraConfigFiles will be ignored if this variable is set.
  ##
  customConfigMap: ""
  # Extra configs for milvus.yaml
  # If set, this config will merge into milvus.yaml
  # Please follow the config structure in the milvus.yaml
  # at https://github.com/milvus-io/milvus/blob/master/configs/milvus.yaml
  # Note: this config will be the top priority which will override the config
  # in the image and helm chart.
  extraConfigFiles:
    user.yaml: |+
      #    For example enable rest http for milvus proxy
      #    proxy:
      #      http:
      #        enabled: true
      #      maxUserNum: 100
      #      maxRoleNum: 10
      ##  Enable tlsMode and set the tls cert and key
      #  tls:
      #    serverPemPath: /etc/milvus/certs/tls.crt
      #    serverKeyPath: /etc/milvus/certs/tls.key
      #   common:
      #     security:
      #       tlsMode: 1

  ## Expose the Milvus service to be accessed from outside the cluster (LoadBalancer service).
  ## or access it from within the cluster (ClusterIP service). Set the service type and the port to serve it.
  ## ref: http://kubernetes.io/docs/user-guide/services/
  ##
  service:
    type: ClusterIP
    port: 19530
    portName: milvus
    nodePort: ""
    annotations: {}
    labels: {}
    ## List of IP addresses at which the Milvus service is available
    ## Ref: https://kubernetes.io/docs/user-guide/services/#external-ips
    ##
    externalIPs: []
    #   - externalIp1

    # LoadBalancerSourcesRange is a list of allowed CIDR values, which are combined with ServicePort to
    # set allowed inbound rules on the security group assigned to the master load balancer
    loadBalancerSourceRanges:
      - 0.0.0.0/0
      # Optionally assign a known public LB IP
      # loadBalancerIP: 1.2.3.4
  ingress:
    enabled: false
    ingressClassName: ""
    annotations:
      # Annotation example: set nginx ingress type
      # kubernetes.io/ingress.class: nginx
      nginx.ingress.kubernetes.io/backend-protocol: GRPC
      nginx.ingress.kubernetes.io/listen-ports-ssl: '[19530]'
      nginx.ingress.kubernetes.io/proxy-body-size: 4m
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
    labels: {}
    rules:
      - host: "milvus-example.local"
        path: "/"
        pathType: "Prefix"
        # - host: "milvus-example2.local"
        #   path: "/otherpath"
        #   pathType: "Prefix"
    tls: []
    #  - secretName: chart-example-tls
    #    hosts:
    #      - milvus-example.local
  serviceAccount:
    create: false
    name:
    annotations:
    labels:
  metrics:
    enabled: true
    serviceMonitor:
      # Set this to `true` to create ServiceMonitor for Prometheus operator
      enabled: false
      interval: "30s"
      scrapeTimeout: "10s"
      # Additional labels that can be used so ServiceMonitor will be discovered by Prometheus
      additionalLabels: {}
  livenessProbe:
    enabled: true
    initialDelaySeconds: 90
    periodSeconds: 30
    timeoutSeconds: 5
    successThreshold: 1
    failureThreshold: 5
  readinessProbe:
    enabled: true
    initialDelaySeconds: 90
    periodSeconds: 10
    timeoutSeconds: 5
    successThreshold: 1
    failureThreshold: 5
  log:
    level: "info"
    file:
      maxSize: 300 # MB
      maxAge: 10 # day
      maxBackups: 20
    format: "text" # text/json
    persistence:
      mountPath: "/milvus/logs"
      ## If true, create/use a Persistent Volume Claim
      ## If false, use emptyDir
      ##
      enabled: false
      annotations:
        helm.sh/resource-policy: keep
      persistentVolumeClaim:
        existingClaim: ""
        ## Milvus Logs Persistent Volume Storage Class
        ## If defined, storageClassName: <storageClass>
        ## If set to "-", storageClassName: "", which disables dynamic provisioning
        ## If undefined (the default) or set to null, no storageClassName spec is
        ##   set, choosing the default provisioner.
        ## ReadWriteMany access mode required for milvus cluster.
        ##
        storageClass:
        accessModes: ReadWriteMany
        size: 10Gi
        subPath: ""
  ## Heaptrack traces all memory allocations and annotates these events with stack traces.
  ## See more: https://github.com/KDE/heaptrack
  ## Enable heaptrack in production is not recommended.
  heaptrack:
    image:
      repository: containers/heaptrack
      tag: 1.3.0-5.1
      pullPolicy: IfNotPresent
      registry: dp.apps.rancher.io
  standalone:
    replicas: 1 # Run standalone mode with replication disabled
    resources: {}
    # Set local storage size in resources
    # resources:
    #   limits:
    #     ephemeral-storage: 100Gi
    nodeSelector: {}
    affinity: {}
    tolerations: []
    securityContext: {}
    containerSecurityContext: {}
    topologySpreadConstraints: [] # Component specific topologySpreadConstraints
    extraEnv: []
    heaptrack:
      enabled: false
    disk:
      enabled: true
      size:
        enabled: false # Enable local storage size limit
    profiling:
      enabled: false # Enable live profiling
    ## Default message queue for milvus standalone
    ## Supported value: rocksmq, natsmq, pulsar, kafka and woodpecker
    messageQueue: woodpecker
    persistence:
      mountPath: "/var/lib/milvus"
      ## If true, alertmanager will create/use a Persistent Volume Claim
      ## If false, use emptyDir
      ##
      enabled: true
      annotations:
        helm.sh/resource-policy: keep
      persistentVolumeClaim:
        existingClaim: ""
        ## Milvus Persistent Volume Storage Class
        ## If defined, storageClassName: <storageClass>
        ## If set to "-", storageClassName: "", which disables dynamic provisioning
        ## If undefined (the default) or set to null, no storageClassName spec is
        ##   set, choosing the default provisioner.
        ##
        storageClass:
        accessModes: ReadWriteOnce
        size: 50Gi
        subPath: ""
  proxy:
    enabled: true
    # You can set the number of replicas to -1 to remove the replicas field in case you want to use HPA
    replicas: 1
    resources: {}
    nodeSelector: {}
    affinity: {}
    tolerations: []
    securityContext: {}
    containerSecurityContext: {}
    topologySpreadConstraints: [] # Component specific topologySpreadConstraints
    extraEnv: []
    heaptrack:
      enabled: false
    profiling:
      enabled: false # Enable live profiling
    http:
      enabled: true # whether to enable http rest server
      debugMode:
        enabled: false
    # Mount a TLS secret into proxy pod
    tls:
      enabled: false
      ## when enabling proxy.tls, all items below should be uncommented and the key and crt values should be populated.
      #    enabled: true
      #    secretName: milvus-tls
      ## expecting base64 encoded values here: i.e. $(cat tls.crt | base64 -w 0) and $(cat tls.key | base64 -w 0)
      #    key: LS0tLS1CRUdJTiBQU--REDUCT
      #    crt: LS0tLS1CRUdJTiBDR--REDUCT
      #  volumes:
      #  - secret:
      #      secretName: milvus-tls
      #    name: milvus-tls
      #  volumeMounts:
      #  - mountPath: /etc/milvus/certs/
      #    name: milvus-tls
    # Deployment strategy, default is RollingUpdate
    # Ref: https://kubernetes.io/docs/concepts/workloads/controllers/deployment/#rolling-update-deployment
    strategy: {}
    annotations: {}
    hpa:
      enabled: false
      minReplicas: 1
      maxReplicas: 5
      cpuUtilization: 40
  rootCoordinator:
    enabled: false
    # You can set the number of replicas greater than 1, only if enable active standby
    replicas: 1 # Run Root Coordinator mode with replication disabled
    resources: {}
    nodeSelector: {}
    affinity: {}
    tolerations: []
    securityContext: {}
    containerSecurityContext: {}
    topologySpreadConstraints: [] # Component specific topologySpreadConstraints
    extraEnv: []
    heaptrack:
      enabled: false
    profiling:
      enabled: false # Enable live profiling
    activeStandby:
      enabled: false # Enable active-standby when you set multiple replicas for root coordinator
    # Deployment strategy, default is RollingUpdate
    # Ref: https://kubernetes.io/docs/concepts/workloads/controllers/deployment/#rolling-update-deployment
    strategy: {}
    annotations: {}
    service:
      port: 53100
      annotations: {}
      labels: {}
      clusterIP: ""
  queryCoordinator:
    enabled: false
    # You can set the number of replicas greater than 1, only if enable active standby
    replicas: 1 # Run Query Coordinator mode with replication disabled
    resources: {}
    nodeSelector: {}
    affinity: {}
    tolerations: []
    securityContext: {}
    containerSecurityContext: {}
    topologySpreadConstraints: [] # Component specific topologySpreadConstraints
    extraEnv: []
    heaptrack:
      enabled: false
    profiling:
      enabled: false # Enable live profiling
    activeStandby:
      enabled: false # Enable active-standby when you set multiple replicas for query coordinator
    # Deployment strategy, default is RollingUpdate
    # Ref: https://kubernetes.io/docs/concepts/workloads/controllers/deployment/#rolling-update-deployment
    strategy: {}
    annotations: {}
    service:
      port: 19531
      annotations: {}
      labels: {}
      clusterIP: ""
  queryNode:
    enabled: true
    # You can set the number of replicas to -1 to remove the replicas field in case you want to use HPA
    replicas: 1
    resources: {}
    # Set local storage size in resources
    # resources:
    #   limits:
    #     ephemeral-storage: 100Gi
    # Set below when using other runtimes than default like nvidia for example
    runtimeClassName: ""
    nodeSelector: {}
    affinity: {}
    tolerations: []
    securityContext: {}
    containerSecurityContext: {}
    topologySpreadConstraints: [] # Component specific topologySpreadConstraints
    extraEnv: []
    heaptrack:
      enabled: false
    disk:
      enabled: true # Enable querynode load disk index, and search on disk index
      size:
        enabled: false # Enable local storage size limit
    profiling:
      enabled: false # Enable live profiling
    # Deployment strategy, default is RollingUpdate
    # Ref: https://kubernetes.io/docs/concepts/workloads/controllers/deployment/#rolling-update-deployment
    strategy: {}
    annotations: {}
    hpa:
      enabled: false
      minReplicas: 1
      maxReplicas: 5
      cpuUtilization: 40
      memoryUtilization: 60
  indexCoordinator:
    enabled: false
    # You can set the number of replicas greater than 1, only if enable active standby
    replicas: 1 # Run Index Coordinator mode with replication disabled
    resources: {}
    nodeSelector: {}
    affinity: {}
    tolerations: []
    securityContext: {}
    containerSecurityContext: {}
    topologySpreadConstraints: [] # Component specific topologySpreadConstraints
    extraEnv: []
    heaptrack:
      enabled: false
    profiling:
      enabled: false # Enable live profiling
    activeStandby:
      enabled: false # Enable active-standby when you set multiple replicas for index coordinator
    # Deployment strategy, default is RollingUpdate
    # Ref: https://kubernetes.io/docs/concepts/workloads/controllers/deployment/#rolling-update-deployment
    strategy: {}
    annotations: {}
    service:
      port: 31000
      annotations: {}
      labels: {}
      clusterIP: ""
  indexNode:
    enabled: false
    # You can set the number of replicas to -1 to remove the replicas field in case you want to use HPA
    replicas: 1
    resources: {}
    # Set local storage size in resources
    # limits:
    #    ephemeral-storage: 100Gi
    # Set below when using other runtimes than default like nvidia for example
    runtimeClassName: ""
    nodeSelector: {}
    affinity: {}
    tolerations: []
    securityContext: {}
    containerSecurityContext: {}
    topologySpreadConstraints: [] # Component specific topologySpreadConstraints
    extraEnv: []
    heaptrack:
      enabled: false
    profiling:
      enabled: false # Enable live profiling
    disk:
      enabled: true # Enable index node build disk vector index
      size:
        enabled: false # Enable local storage size limit
    # Deployment strategy, default is RollingUpdate
    # Ref: https://kubernetes.io/docs/concepts/workloads/controllers/deployment/#rolling-update-deployment
    strategy: {}
    annotations: {}
    hpa:
      enabled: false
      minReplicas: 1
      maxReplicas: 5
      cpuUtilization: 40
  dataCoordinator:
    enabled: false
    # You can set the number of replicas greater than 1, only if enable active standby
    replicas: 1 # Run Data Coordinator mode with replication disabled
    resources: {}
    nodeSelector: {}
    affinity: {}
    tolerations: []
    securityContext: {}
    containerSecurityContext: {}
    topologySpreadConstraints: [] # Component specific topologySpreadConstraints
    extraEnv: []
    heaptrack:
      enabled: false
    profiling:
      enabled: false # Enable live profiling
    activeStandby:
      enabled: false # Enable active-standby when you set multiple replicas for data coordinator
    # Deployment strategy, default is RollingUpdate
    # Ref: https://kubernetes.io/docs/concepts/workloads/controllers/deployment/#rolling-update-deployment
    strategy: {}
    annotations: {}
    service:
      port: 13333
      annotations: {}
      labels: {}
      clusterIP: ""
  dataNode:
    enabled: true
    # You can set the number of replicas to -1 to remove the replicas field in case you want to use HPA
    replicas: 1
    resources: {}
    nodeSelector: {}
    affinity: {}
    tolerations: []
    securityContext: {}
    containerSecurityContext: {}
    topologySpreadConstraints: [] # Component specific topologySpreadConstraints
    extraEnv: []
    heaptrack:
      enabled: false
    profiling:
      enabled: false # Enable live profiling
    # Deployment strategy, default is RollingUpdate
    # Ref: https://kubernetes.io/docs/concepts/workloads/controllers/deployment/#rolling-update-deployment
    strategy: {}
    annotations: {}
    hpa:
      enabled: false
      minReplicas: 1
      maxReplicas: 5
      cpuUtilization: 40
  ## mixCoordinator contains all coord
  ## If you want to use mixcoord, enable this and disable all of other coords
  mixCoordinator:
    enabled: true
    # You can set the number of replicas greater than 1, only if enable active standby
    replicas: 1 # Run Mixture Coordinator mode with replication disabled
    resources: {}
    nodeSelector: {}
    affinity: {}
    tolerations: []
    securityContext: {}
    containerSecurityContext: {}
    topologySpreadConstraints: [] # Component specific topologySpreadConstraints
    extraEnv: []
    heaptrack:
      enabled: false
    profiling:
      enabled: false # Enable live profiling
    activeStandby:
      enabled: false # Enable active-standby when you set multiple replicas for Mixture coordinator
    # Deployment strategy, default is RollingUpdate
    # Ref: https://kubernetes.io/docs/concepts/workloads/controllers/deployment/#rolling-update-deployment
    strategy: {}
    annotations: {}
    service:
      annotations: {}
      labels: {}
      clusterIP: ""
  streamingNode:
    replicas: 1
    resources: {}
    nodeSelector: {}
    affinity: {}
    tolerations: []
    securityContext: {}
    containerSecurityContext: {}
    extraEnv: []
    heaptrack:
      enabled: false
    profiling:
      enabled: false # Enable live profiling
    strategy: {}
  cdc:
    enabled: false
    replicas: 1 # Currently, CDC only supports one replica
    resources: {}
    nodeSelector: {}
    affinity: {}
    tolerations: []
    securityContext: {}
    containerSecurityContext: {}
    topologySpreadConstraints: [] # Component specific topologySpreadConstraints
    extraEnv: []
    heaptrack:
      enabled: false
    profiling:
      enabled: false # Enable live profiling
    strategy: {}
    annotations: {}
  ###################################
  # External S3
  # - these configs are only used when `externalS3.enabled` is true
  ###################################
  externalS3:
    enabled: false
    host: ""
    port: ""
    accessKey: ""
    secretKey: ""
    useSSL: false
    bucketName: ""
    rootPath: ""
    useIAM: false
    cloudProvider: "aws"
    iamEndpoint: ""
    region: ""
    useVirtualHost: false
  ###################################
  # GCS Gateway
  # - these configs are only used when `minio.gcsgateway.enabled` is true
  ###################################
  externalGcs:
    bucketName: ""
  ###################################
  # External etcd
  # - these configs are only used when `externalEtcd.enabled` is true
  ###################################
  externalEtcd:
    enabled: false
    ## the endpoints of the external etcd
    ##
    endpoints:
      - localhost:2379
  ###################################
  # External pulsar
  # - these configs are only used when `externalPulsar.enabled` is true
  ###################################
  externalPulsar:
    enabled: false
    host: localhost
    port: 6650
    maxMessageSize: "5242880" # 5 * 1024 * 1024 Bytes, Maximum size of each message in pulsar.
    tenant: public
    namespace: default
    authPlugin: ""
    authParams: ""
  ###################################
  # External kafka
  # - these configs are only used when `externalKafka.enabled` is true
  # - note that the following are just examples, you should confirm the
  #   value of brokerList and mechanisms according to the actual external
  #   Kafka configuration. E.g. If you select the AWS MSK, the configuration
  #   should look something like this:
  #   externalKafka:
  #     enabled: true
  #     brokerList: "xxxx:9096"
  #     securityProtocol: SASL_SSL
  #     sasl:
  #       mechanisms: SCRAM-SHA-512
  #       password: "xxx"
  #       username: "xxx"
  ###################################
  externalKafka:
    enabled: false
    brokerList: localhost:9092
    securityProtocol: SASL_SSL
    sasl:
      mechanisms: PLAIN
      username: ""
      password: ""
  ## Configuration values for the etcd dependency
  ## ref: https://artifacthub.io/packages/helm/bitnami/etcd
  ##
  etcd:
    enabled: true
    name: etcd
    replicaCount: 3
    service:
      enabled: true
      annotations: {}
      type: ClusterIP
      nodePorts:
        client: "2379"
        peer: "2380"
      ports:
        client: "2379"
        peer: "2380"
    auth:
      rbac:
        enabled: false
    persistence:
      enabled: true
      storageClassName:
      accessModes:
        - ReadWriteOnce
  ## Configuration values for the kafka dependency
  ## ref: https://apps.rancher.io/applications/apache-kafka
  ##
  kafka:
    enabled: true
    name: kafka
    broker:
      enabled: true
    cluster:
      nodeCount:
        broker: 3
        controller: 3
      listeners:
        client:
          protocol: 'PLAINTEXT'
        controller:
          protocol: 'PLAINTEXT'
  ## Configuration values for the minio dependency
  ## ref: https://github.com/zilliztech/milvus-helm/blob/master/charts/minio/README.md
  ##
  minio:
    enabled: true
    name: minio
    replicas: 4
    users:
      - accessKey: minioadmin
        secretKey: minioadmin
        existingSecret: ""
        policy: consoleAdmin
    bucketName: "milvus-bucket"
    rootPath: file
    useIAM: false
    iamEndpoint: ""
    region: ""
    useVirtualHost: false
    resources:
      requests:
        memory: 2Gi


# =============================================================================
# --- Ollama ---
# =============================================================================
ollama:
  Pulled: dp.apps.rancher.io/charts/ollama:1.38.0
  Digest: sha256:c69fbd1bdd03c1b738d004edae642016a75a00a60a3a3a0c9bb6ab9b626b5f96
  global:
    # -- Global override for container image registry
    imageRegistry: ""
    # -- Global override for container image registry pull secrets
    imagePullSecrets: []
  # Default values for ollama-helm.
  # This is a YAML-formatted file.
  # Declare variables to be passed into your templates.

  # -- Number of replicas
  replicaCount: 1
  # Knative configuration
  knative:
    # -- Enable Knative integration
    enabled: false
    # -- Knative service container concurrency
    containerConcurrency: 0
    # -- Knative service timeout seconds
    timeoutSeconds: 300
    # -- Knative service response start timeout seconds
    responseStartTimeoutSeconds: 300
    # -- Knative service idle timeout seconds
    idleTimeoutSeconds: 300
    # -- Knative service annotations
    annotations: {}
  # Docker image
  image:
    # -- Docker image registry
    repository: containers/ollama
    # -- Docker pull policy
    pullPolicy: IfNotPresent
    # -- Docker image tag, overrides the image tag whose default is the chart appVersion.
    tag: "0.14.2-11.17"
    registry: dp.apps.rancher.io
  # -- Docker registry secret names as an array
  imagePullSecrets: []
  # -- String to partially override template  (will maintain the release name)
  nameOverride: ""
  # -- String to fully override template
  fullnameOverride: ""
  # -- String to fully override namespace
  namespaceOverride: ""
  # Ollama parameters
  ollama:
    # Port Ollama is listening on
    port: 11434
    gpu:
      # -- Enable GPU integration
      enabled: false
      # -- Enable DRA GPU integration
      # If enabled, it will use DRA instead of Device Driver Plugin and create a ResourceClaim and GpuClaimParameters
      draEnabled: false
      # -- DRA GPU DriverClass
      draDriverClass: "gpu.nvidia.com"
      # -- Existing DRA GPU ResourceClaim Template
      draExistingClaimTemplate: ""
      # -- GPU type: 'nvidia' or 'amd'
      # If 'ollama.gpu.enabled', default value is nvidia
      # If set to 'amd', this will add 'rocm' suffix to image tag if 'image.tag' is not override
      # This is due cause AMD and CPU/CUDA are different images
      type: 'nvidia'
      # -- Specify the number of GPU
      # If you use MIG section below then this parameter is ignored
      number: 1
      # -- only for nvidia cards; change to (example) 'nvidia.com/mig-1g.10gb' to use MIG slice
      nvidiaResource: "nvidia.com/gpu"
      # nvidiaResource: "nvidia.com/mig-1g.10gb" # example
      # If you want to use more than one NVIDIA MIG you can use the following syntax (then nvidiaResource is ignored and only the configuration in the following MIG section is used)

      mig:
        # -- Enable multiple mig devices
        # If enabled you will have to specify the mig devices
        # If enabled is set to false this section is ignored
        enabled: false
        # -- Specify the mig devices and the corresponding number
        devices: {}
        #        1g.10gb: 1
        #        3g.40gb: 1
    models:
      # -- List of models to pull at container startup
      # The more you add, the longer the container will take to start if models are not present
      # pull:
      #  - llama2
      #  - mistral
      pull: []
      # -- List of models to load in memory at container startup
      # run:
      #  - llama2
      #  - mistral
      run: []
      # -- List of models to create at container startup, there are two options
      # 1. Create a raw model
      # 2. Load a model from configMaps, configMaps must be created before and are loaded as volume in "/models" directory.
      # create:
      #  - name: llama3.1-ctx32768
      #    configMapRef: my-configmap
      #    configMapKeyRef: configmap-key
      #  - name: llama3.1-ctx32768
      #    template: |
      #      FROM llama3.1
      #      PARAMETER num_ctx 32768
      create: []
      # -- Automatically remove models present on the disk but not specified in the values file
      clean: false
    # -- Add insecure flag for pulling at container startup
    insecure: false
    # -- Override ollama-data volume mount path, default: "/root/.ollama"
    mountPath: ""
  # Service account
  # ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-service-account/
  serviceAccount:
    # -- Specifies whether a service account should be created
    create: true
    # -- Automatically mount a ServiceAccount's API credentials?
    automount: true
    # -- Annotations to add to the service account
    annotations: {}
    # -- The name of the service account to use.
    # If not set and create is true, a name is generated using the fullname template
    name: ""
  # -- Map of annotations to add to the pods
  podAnnotations: {}
  # -- Map of labels to add to the pods
  podLabels: {}
  # -- Pod Security Context
  podSecurityContext: {}
  # fsGroup: 2000

  # -- Priority Class Name
  priorityClassName: ""
  # -- Container Security Context
  securityContext: {}
  # capabilities:
  #  drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

  # -- Specify runtime class
  runtimeClassName: ""
  # Configure Service
  service:
    # -- Service type
    type: ClusterIP
    # -- Service port
    port: 11434
    # -- Service node port when service type is 'NodePort'
    nodePort: 31434
    # -- Load Balancer IP address
    loadBalancerIP:
    # -- Annotations to add to the service
    annotations: {}
    # -- Labels to add to the service
    labels: {}
    # -- IP Families for the service
    ipFamilies: []
    # - IPv4
    # - IPv6

    # -- IP Family Policy for the service
    ipFamilyPolicy: ""
    # SingleStack
    # PreferDualStack
    # RequireDualStack
  # Configure Deployment
  deployment:
    # -- Labels to add to the deployment
    labels: {}
  # Configure the ingress resource that allows you to access the
  ingress:
    # -- Enable ingress controller resource
    enabled: false
    # -- IngressClass that will be used to implement the Ingress (Kubernetes 1.18+)
    className: ""
    # -- Additional annotations for the Ingress resource.
    annotations: {}
    # kubernetes.io/ingress.class: traefik
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"

    # The list of hostnames to be covered with this ingress record.
    hosts:
      - host: ollama.local
        paths:
          - path: /
            pathType: Prefix
    # --  The tls configuration for hostnames to be covered with this ingress record.
    tls: []
    #  - secretName: chart-example-tls
    #    hosts:
    #      - chart-example.local
  # Configure resource requests and limits
  # ref: http://kubernetes.io/docs/user-guide/compute-resources/
  resources:
    # -- Pod requests
    requests: {}
    # Memory request
    # memory: 4096Mi

    # CPU request
    # cpu: 2000m

    # -- Pod limit
    limits: {}
    # Memory limit
    # memory: 8192Mi
  # CPU limit
  # cpu: 4000m

  # Configure extra options for liveness probe
  # ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-probes/#configure-probes
  livenessProbe:
    # -- Enable livenessProbe
    enabled: true
    # -- Request path for livenessProbe
    path: /
    # -- Initial delay seconds for livenessProbe
    initialDelaySeconds: 60
    # -- Period seconds for livenessProbe
    periodSeconds: 10
    # -- Timeout seconds for livenessProbe
    timeoutSeconds: 5
    # -- Failure threshold for livenessProbe
    failureThreshold: 6
    # -- Success threshold for livenessProbe
    successThreshold: 1
  # Configure extra options for readiness probe
  # ref: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-probes/#configure-probes
  readinessProbe:
    # -- Enable readinessProbe
    enabled: true
    # -- Request path for readinessProbe
    path: /
    # -- Initial delay seconds for readinessProbe
    initialDelaySeconds: 30
    # -- Period seconds for readinessProbe
    periodSeconds: 5
    # -- Timeout seconds for readinessProbe
    timeoutSeconds: 3
    # -- Failure threshold for readinessProbe
    failureThreshold: 6
    # -- Success threshold for readinessProbe
    successThreshold: 1
  # Configure autoscaling
  autoscaling:
    # -- Enable autoscaling
    enabled: false
    # -- Number of minimum replicas
    minReplicas: 1
    # -- Number of maximum replicas
    maxReplicas: 100
    # -- CPU usage to target replica
    targetCPUUtilizationPercentage: 80
    # -- targetMemoryUtilizationPercentage: 80
  # -- Additional volumes on the output Deployment definition.
  volumes: []
  # -- - name: foo
  #   secret:
  #     secretName: mysecret
  #     optional: false

  # -- Additional volumeMounts on the output Deployment definition.
  volumeMounts: []
  # -- - name: foo
  #   mountPath: "/etc/foo"
  #   readOnly: true

  # -- Additional arguments on the output Deployment definition.
  extraArgs: []
  # -- Additional environments variables on the output Deployment definition.
  # For extra OLLAMA env, please refer to https://github.com/ollama/ollama/blob/main/envconfig/config.go
  extraEnv: []
  #  - name: OLLAMA_DEBUG
  #    value: "1"

  # -- Additionl environment variables from external sources (like ConfigMap)
  extraEnvFrom: []
  #  - configMapRef:
  #      name: my-env-configmap

  # Enable persistence using Persistent Volume Claims
  # ref: https://kubernetes.io/docs/concepts/storage/persistent-volumes/
  persistentVolume:
    # -- Enable persistence using PVC
    enabled: false
    # -- Ollama server data Persistent Volume access modes
    # Must match those of existing PV or dynamic provisioner
    # Ref: http://kubernetes.io/docs/user-guide/persistent-volumes/
    accessModes:
      - ReadWriteOnce
    # -- Ollama server data Persistent Volume annotations
    annotations: {}
    # -- If you'd like to bring your own PVC for persisting Ollama state, pass the name of the
    # created + ready PVC here. If set, this Chart will not create the default PVC.
    # Requires server.persistentVolume.enabled: true
    existingClaim: ""
    # -- Ollama server data Persistent Volume size
    size: 30Gi
    # -- Ollama server data Persistent Volume Storage Class
    # If defined, storageClassName: <storageClass>
    # If set to "-", storageClassName: "", which disables dynamic provisioning
    # If undefined (the default) or set to null, no storageClassName spec is
    # set, choosing the default provisioner.  (gp2 on AWS, standard on
    # GKE, AWS & OpenStack)
    storageClass: ""
    # -- Ollama server data Persistent Volume Binding Mode
    # If defined, volumeMode: <volumeMode>
    # If empty (the default) or set to null, no volumeBindingMode spec is
    # set, choosing the default mode.
    volumeMode: ""
    # -- Subdirectory of Ollama server data Persistent Volume to mount
    # Useful if the volume's root directory is not empty
    subPath: ""
    # -- Pre-existing PV to attach this claim to
    # Useful if a CSI auto-provisions a PV for you and you want to always
    # reference the PV moving forward
    volumeName: ""
  # -- Node labels for pod assignment.
  nodeSelector: {}
  # -- Tolerations for pod assignment
  tolerations: []
  # -- Affinity for pod assignment
  affinity: {}
  # -- Lifecycle for pod assignment (override ollama.models startup pull/run)
  lifecycle: {}
  # How to replace existing pods
  updateStrategy:
    # -- Deployment strategy can be "Recreate" or "RollingUpdate". Default is Recreate
    type: "Recreate"
  # -- Topology Spread Constraints for pod assignment
  topologySpreadConstraints: {}
  # -- Wait for a grace period
  terminationGracePeriodSeconds: 120
  # -- Init containers to add to the pod
  initContainers: []
  # - name: startup-tool
  #   image: alpine:3
  #   command: [sh, -c]
  #   args:
  #     - echo init

  # -- Use the host’s ipc namespace.
  hostIPC: false
  # -- Use the host’s pid namespace
  hostPID: false
  # -- Use the host's network namespace.
  hostNetwork: false
  # -- Extra K8s manifests to deploy
  extraObjects: []
  #  - apiVersion: v1
  #    kind: PersistentVolume
  #    metadata:
  #      name: aws-efs
  #    data:
  #      key: "value"
  #  - apiVersion: scheduling.k8s.io/v1
  #    kind: PriorityClass
  #    metadata:
  #      name: high-priority
  #    value: 1000000
  #    globalDefault: false
  #    description: "This priority class should be used for XYZ service pods only."

  # Test connection pods
  tests:
    enabled: true
    # -- Labels to add to the tests
    labels: {}
    # -- Annotations to add to the tests
    annotations: {}


# =============================================================================
# --- Open WebUI ---
# =============================================================================
open-webui:
  Pulled: dp.apps.rancher.io/charts/open-webui:8.19.1
  Digest: sha256:171470fa5accf61000311218fc2b54fe5f51a15972fd2688127bdb4cdc5c8e95
  global:
    # -- Global override for container image registry
    imageRegistry: ""
    # -- Global override for container image registry pull secrets
    imagePullSecrets: []
    tls:
      # options: suse-private-ai, letsEncrypt, secret
      source: suse-private-ai
      issuerName: suse-private-ai
      # This section to be filled out when using letsEncrypt as the tls source
      letsEncrypt:
        environment: staging
        email: none@example.com
        ingress:
          class: ""
      # Additional Trusted CAs.
      # Enable this flag and add your CA certs as a secret named tls-ca-additional in the suse-private-ai namespace.
      additionalTrustedCAs: false
  # -- Provide a name in place of the default application name
  nameOverride: ""
  # -- Provide a namespace in place of the default release namespace
  namespaceOverride: ""
  ollama:
    # -- Automatically install Ollama Helm chart
    # @section -- External Tools configuration
    enabled: true
    # -- If enabling embedded Ollama, update fullnameOverride to your desired Ollama name value, or else it will use the default ollama.name value from the Ollama chart
    # @section -- External Tools configuration
    fullnameOverride: "open-webui-ollama"
    # -- Example Ollama configuration with nvidia GPU enabled, automatically downloading a model, and deploying a PVC for model persistence
    # ollama:
    #   gpu:
    #     enabled: true
    #     type: 'nvidia'
    #     number: 1
    #   models:
    #     pull:
    #       - llama3
    #     run:
    #       - llama3
    # runtimeClassName: nvidia
    # persistentVolume:
    #   enabled: true
    #   volumeName: "example-pre-existing-pv-created-by-smb-csi"
  # -- A list of Ollama API endpoints. These can be added in lieu of automatically installing the Ollama Helm chart, or in addition to it.
  # @section -- External Tools configuration
  ollamaUrls: []
  # -- Disables taking Ollama Urls from `ollamaUrls`  list
  # @section -- External Tools configuration
  ollamaUrlsFromExtraEnv: false
  pipelines:
    # -- Automatically install Pipelines chart to extend Open WebUI functionality using Pipelines: https://github.com/open-webui/pipelines
    # @section -- External Tools configuration
    enabled: false
    # -- This section can be used to pass required environment variables to your pipelines (e.g. Langfuse hostname)
    # @section -- External Tools configuration
    extraEnvVars: []
  tika:
    # -- Automatically install Apache Tika to extend Open WebUI
    # @section -- External Tools configuration
    enabled: false
  websocket:
    # -- Enables websocket support in Open WebUI with env `ENABLE_WEBSOCKET_SUPPORT`
    # @section -- Websocket configuration
    enabled: true
    # -- Specifies the websocket manager to use with env `WEBSOCKET_MANAGER`: redis (default)
    # @section -- Websocket configuration
    manager: redis
    # -- Specifies the URL of the Redis instance for websocket communication. Template with `redis://[:<password>@]<hostname>:<port>/<db>`
    # @section -- Websocket configuration
    url: redis://open-webui-redis:6379/0
    # -- Node selector for websocket pods
    # @section -- Websocket configuration
    nodeSelector: {}
    redis:
      # -- Enable redis installation
      # @section -- Websocket configuration
      enabled: true
      # -- Redis name
      # @section -- Websocket configuration
      name: open-webui-redis
      # -- Redis labels
      # @section -- Websocket configuration
      labels: {}
      # -- Redis annotations
      # @section -- Websocket configuration
      annotations: {}
      pods:
        # -- Redis pod labels
        # @section -- Websocket configuration
        labels: {}
        # -- Redis pod annotations
        # @section -- Websocket configuration
        annotations: {}
      image:
        # -- Redis image registry
        # @section -- Websocket configuration
        registry: dp.apps.rancher.io
        # -- Redis image repository
        # @section -- Websocket configuration
        repository: containers/redis
        # -- Redis image tag
        # @section -- Websocket configuration
        tag: "8.4.0-2.1"
        # -- Redis image pull policy
        # @section -- Websocket configuration
        pullPolicy: IfNotPresent
      # -- Redis command (overrides default)
      # @section -- Websocket configuration
      command: []
      # -- Redis arguments (overrides default)
      # @section -- Websocket configuration
      args: []
      # -- Redis resources
      # @section -- Websocket configuration
      resources: {}
      service:
        # -- Redis container/target port
        # @section -- Websocket configuration
        containerPort: 6379
        # -- Redis service type
        # @section -- Websocket configuration
        type: ClusterIP
        # -- Redis service labels
        # @section -- Websocket configuration
        labels: {}
        # -- Redis service annotations
        # @section -- Websocket configuration
        annotations: {}
        # -- Redis service port name. Istio needs this to be something like `tcp-redis`
        # @section -- Websocket configuration
        portName: http
        # -- Redis service port
        # @section -- Websocket configuration
        port: 6379
        # -- Redis service node port. Valid only when type is `NodePort`
        # @section -- Websocket configuration
        nodePort: ""
      # -- Redis tolerations for pod assignment
      # @section -- Websocket configuration
      tolerations: []
      # -- Redis affinity for pod assignment
      # @section -- Websocket configuration
      affinity: {}
      # -- Redis container security context (certain specs are not allowed on a pod level), if readOnlyRootFilesystem is true, an emtpyDir will be mounted on the redis container
      # @section -- Websocket configuration
      containerSecurityContext: {}
      # readOnlyRootFilesystem: true
      # runAsNonRoot: true
      # -- Redis pod security context
      # @section -- Websocket configuration
      podSecurityContext: {}
      # runAsUser: 999
      # runAsGroup: 1000
  # -- Value of cluster domain
  clusterDomain: cluster.local
  # -- Additional custom labels to add to the Open WebUI deployment/statefulset metadata
  extraLabels: {}
  # -- Additional annotations to add to the Open WebUI deployment/statefulset metadata
  annotations: {}
  # -- Additional annotations to add to the Open WebUI pods
  podAnnotations: {}
  # -- Additional custom labels to add to the Open WebUI pods
  podLabels: {}
  # -- Number of Open WebUI replicas
  replicaCount: 1
  # -- Revision history limit for the workload manager (deployment).
  revisionHistoryLimit: 10
  # -- Priority class name for the Open WebUI pods
  priorityClassName: ""
  # -- Strategy for updating the workload manager: deployment or statefulset
  strategy: {}
  image:
    # -- Open WebUI image registry
    # @section -- Image configuration
    registry: dp.apps.rancher.io
    # -- Open WebUI image repository
    # @section -- Image configuration
    repository: containers/open-webui
    # -- Open WebUI image tag (Open WebUI image tags can be found here: https://github.com/open-webui/open-webui)
    # @section -- Image configuration
    tag: "0.6.41-14.20"
    # -- Open WebUI image pull policy
    # @section -- Image configuration
    pullPolicy: "IfNotPresent"
    # -- Use a slim version of the Open WebUI image
    # @section -- Image configuration
    useSlim: false
  # -- Configure imagePullSecrets to use private registry
  # ref: <https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry>
  # @section -- Image configuration
  imagePullSecrets: []
  # imagePullSecrets:
  # - name: myRegistryKeySecretName

  # -- Open WebUI container command (overrides default entrypoint)
  command: []
  # -- Open WebUI container arguments (overrides default)
  args: []
  serviceAccount:
    # -- Enable service account creation
    # @section -- Service Account configuration
    enable: true
    # -- If create is set to false, set `name` to existing service account name
    # @section -- Service Account configuration
    create: true
    # -- Service account name to use. If `ServiceAccount.create` is false, this assumes an existing service account exists with the set name. If not set and `serviceAccount.create` is true, a name is generated using the fullname template.
    # @section -- Service Account configuration
    name: "existing-sa"
    # -- Additional annotations to add to the ServiceAccount
    # @section -- Service Account configuration
    annotations: {}
    # -- Automount service account token for the Open WebUI pods
    # @section -- Service Account configuration
    automountServiceAccountToken: false
  # -- Probe for liveness of the Open WebUI container
  # ref: <https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes>
  # @section -- Probes configuration
  livenessProbe: {}
  # livenessProbe:
  #   httpGet:
  #     path: /health
  #     port: http
  #   failureThreshold: 1
  #   periodSeconds: 10

  # -- Probe for readiness of the Open WebUI container
  # ref: <https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes>
  # @section -- Probes configuration
  readinessProbe: {}
  # readinessProbe:
  #   httpGet:
  #     path: /health/db
  #     port: http
  #   failureThreshold: 1
  #   periodSeconds: 10

  # -- Probe for startup of the Open WebUI container
  # ref: <https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes>
  # @section -- Probes configuration
  startupProbe: {}
  # startupProbe:
  #   httpGet:
  #     path: /health
  #     port: http
  #   initialDelaySeconds: 30
  #   periodSeconds: 5
  #   failureThreshold: 20

  # -- Resource requests and limits for the Open WebUI container
  resources: {}
  copyAppData:
    # -- Open WebUI copy-app-data init container command (overrides default)
    command: []
    # -- Open WebUI copy-app-data init container arguments (overrides default)
    args: []
    # -- Resource requests and limits for the Open WebUI copy-app-data init container
    resources: {}
  managedCertificate:
    # -- Enable GKE Managed Certificate for Ingress TLS
    # @section -- Ingress configuration
    enabled: false
    # -- Name of the Managed Certificate resource to create
    # @section -- Ingress configuration
    name: "mydomain-chat-cert" # You can override this name if needed
    # -- Domains to include in the Managed Certificate
    # @section -- Ingress configuration
    domains:
      - chat.example.com # update to your real domain
  ingress:
    # -- Enable Ingress controller for Open WebUI
    # @section -- Ingress configuration
    enabled: true
    # -- Ingress class to use, e.g., for GKE Ingress use "gce", for NGINX Ingress use "nginx". If using an Ingress class other than the default, ensure your cluster has the corresponding Ingress controller installed and configured.
    # @section -- Ingress configuration
    class: ""
    # -- Use appropriate annotations for your Ingress controller, e.g., for NGINX:
    # @section -- Ingress configuration
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
    #   # Example for GKE Ingress
    #   kubernetes.io/ingress.class: "gce"
    #   kubernetes.io/ingress.global-static-ip-name: "open-webui-external-ip"   #  you need to create this address in GCP console
    #   # Force HTTP to redirect to HTTPS
    #   nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    #   nginx.ingress.kubernetes.io/ssl-redirect: "true"
    #   nginx.ingress.kubernetes.io/permanent-redirect: "https://chat.example.com"
    #   networking.gke.io/managed-certificates: "mydomain-chat-cert"
    #   # nginx.ingress.kubernetes.io/rewrite-target: /
    # -- Host for the Ingress record
    # @section -- Ingress configuration
    host: "" # update to your real domain
    # -- Additional hosts for the Ingress record
    # @section -- Ingress configuration
    additionalHosts: []
    # -- TLS configuration for the Ingress resource
    # @section -- Ingress configuration
    tls: true
    # -- TLS secret name for the Ingress record
    # @section -- Ingress configuration
    existingSecret: ""
    # -- Additional custom labels to add to the Ingress metadata
    # @section -- Ingress configuration
    extraLabels: {}
    # extraLabels:
    #   app.kubernetes.io/environment: "staging"
  persistence:
    # -- Enable persistence using PVC for Open WebUI data
    # @section -- Persistence configuration
    enabled: true
    # -- Size of the Open WebUI PVC
    # @section -- Persistence configuration
    size: 2Gi
    # -- Use existingClaim if you want to re-use an existing Open WebUI PVC instead of creating a new one
    # @section -- Persistence configuration
    existingClaim: ""
    # -- Subdirectory of Open WebUI PVC to mount. Useful if root directory is not empty.
    # @section -- Persistence configuration
    subPath: ""
    # -- If using multiple replicas, you must update accessModes to ReadWriteMany
    # @section -- Persistence configuration
    accessModes:
      - ReadWriteOnce
    # -- Storage class of the Open WebUI PVC
    # @section -- Persistence configuration
    storageClass: ""
    # -- Selector to match to get the volume bound to the claim
    # @section -- Persistence configuration
    selector: {}
    # -- Additional annotations to add to the PVC
    # @section -- Persistence configuration
    annotations: {}
    # -- Sets the storage provider, availables values are `local`, `s3`, `gcs` or `azure`
    # @section -- Persistence configuration
    provider: local
    s3:
      # -- Sets the access key ID for S3 storage
      # @section -- Amazon S3 Storage configuration
      accessKey: ""
      # -- Sets the secret access key for S3 storage (ignored if secretKeyExistingSecret is set)
      # @section -- Amazon S3 Storage configuration
      secretKey: ""
      # -- Set the secret access key for S3 storage from existing k8s secret
